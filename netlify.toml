[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/do-you-need-a-car-in-sicily-FINAL/"
  to = "/do-you-need-a-car-in-sicily/"
  status = 301
